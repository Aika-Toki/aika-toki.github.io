<!DOCTYPE html>
<html lang="ja">
<meta charset="utf-8">
<head>
    <title>【audioplayer</title>
    <link rel="stylesheet" href="./css/style.css">
    <script type="text/javascript" src="./js/script.js"></script>
    <script src="https://kit.fontawesome.com/ab8882eb77.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="thumbnail">
        <div class="box" id="makeImg">
            <label id="fileExtention"></label>
        </div>
    </div>
    <div id="title">
        <label id="audioTitle"></label>
        <label id="audioArtist"></label>
    </div>
    <div id="controller">
        <button onclick="playPauseAudio();" id="playPause">▶︎</button>
        <button onclick="stopAudio();" id="stop">■</button>
        <div id="seekarea">
            <label id="current">00:00</label>
            <div id="seekbar"></div>
            <label id="duration">00:00</label>
        </div>
        <div id="speed">
            <input type="range" onchange="speedChange();" min="0.1" max="16" step="0.1">
            <label id="speedVal"></label>
        </div>
    </div>
    <select onchange="audioChange();" id="audioList">
        <option value="0">roudoku2021.mp3</option>
    </select>
</body>
</html>
