<!DOCTYPE html>
<html lang="ja">
<meta charset="utf-8">
<head>
    <title>【audioplayer</title>
    <link rel="stylesheet" href="./css/style.css">
    <script type="text/javascript" src="./js/script.js"></script>
    <script src="https://kit.fontawesome.com/ab8882eb77.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="thumbnail">
        <div class="box" id="makeImg">
            <label id="fileExtention"></label>
        </div>
    </div>
    <div id="title">
        <label id="audioTitle"></label>
        <label id="audioArtist"></label>
    </div>
    <div id="controller">
        <button onclick="playPauseAudio();" id="playPause">
            <i class="fas fa-play"></i>
        </button>
        <button onclick="stopAudio();" id="stop">
            <i class="fas fa-stop"></i>
        </button>
        <div id="volume">
            <label id="volumeVal">***%</label>
            <input id="volumeRange" type="range" min="0" max="1.0" step="0.01" value="1" list="volumeList" onchange="volumeChange();" />
            <datalist id="volumeList">
                <option value="0.0"></option>
                <option value="0.1"></option>
                <option value="0.2"></option>
                <option value="0.25"></option>
                <option value="0.3"></option>
                <option value="0.4"></option>
                <option value="0.5"></option>
                <option value="0.6"></option>
                <option value="0.7"></option>
                <option value="0.75"></option>
                <option value="0.8"></option>
                <option value="0.9"></option>
                <option value="1.0"></option>
            </datalist>
        </div>
        <div id="times">
            <label id="current">**:**</label>
            <label id="slash">/</label>
            <label id="duration">**:**</label>
        </div>
        <div id="seekarea">
            <div id="seekbar"></div>
            <div id="progressbar"></div>
        </div>
        <div id="speed">
            <label id="speedVal">*.*x</label>
            <input type="range" onchange="speedChange();" min="0.1" max="2" step="0.05" value="1.0" id="speedChanger" list="speedList" />
            <datalist id="speedList">
                <option value="0.25"></option>
                <option value="0.5"></option>
                <option value="0.75"></option>
                <option value="1.0"></option>
                <option value="1.25"></option>
                <option value="1.5"></option>
                <option value="1.75"></option>
                <option value="2.0"></option>
            </datalist>
        </div>
    </div>
    <select onchange="audioChange();" id="audioList"></select>
</body>
</html>
