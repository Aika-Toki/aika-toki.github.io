<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電車遅延情報</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.1.0.min.js"></script>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.3/css/all.css">
    <script src="./index.js" charset="utf-8"></script>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
        }
        #category, #published, #updated, #description {
            padding-left: 1.5vw;
        }
        #description {
            font-size: 0.8vw;
            margin: 0;
        }
        #updt {
            padding-left: 1vw;
        }
        #header {
            display: flex;
            align-items: flex-end;
        }
        #bg {
            width: 100vw;
            height: 100vh;
            filter: blur(20px) brightness(1.1);
            position: absolute;
            background-size: 105% 105%;
            background-repeat: no-repeat;
            z-index: -99;
            background-position: center;
        }
        #list marquee {
            font-size: 2em;
            font-weight: bold;
            color: white;
        }
        a marquee {
            width: 54.8vw;
        }
        #list {
            width: 60vw;
        }
        #content {
            margin: 0 auto;
            display: grid;
            width: 60vw;
        }
        .item-head{
            display: inline-flex;
            height: 3vh;
            width: 60vw;
            position: relative;
            background-color: orange;
            transition-property: background-color;
            transition-duration: 300ms;
        }
        .item-head.open {
            background-color: white;
        }
        .item-head i {
            right: 0;
            font-size: 1vw;
            position: absolute;
            transition-property: transform, color;
            transition-duration: 300ms;
            margin-top: 0.5vh;
            color: white;
        }
        .item-head.open i {
            transform: rotateZ(90deg);
            color: orange;
        }
        .item-head #title {
            margin: 0;
            color: white;
            transition-property: color;
            transition-duration: 300ms;
        }
        .item-head.open #title {
            color: orange;
        }
        .item {
            width: 60vw;
            height: 3vh;
            background-color: orange;
            transition-property: text-shadow, text-decoration, border;
            transition-duration: 300ms;
            text-decoration-line: underline;
            text-decoration-color: #fff0;
            border-color: #fff0;
            border-style: solid none;   
            border-width: 3px 0px;

        }
        .item:hover {
            text-shadow: 0px 0px 8px #fff8;
            text-decoration-color: white;
            border-color: #fff;
        }
        #link {
            background-color: orange;
            color: white;
            padding: 1vh 1vw;
            border-radius: 500px;
            border-width: 3px;
            border-style: solid;
            border-color: white;
            box-shadow: 0px 0px 5px 0px rgba(0, 0, 0, 0.6);
            text-decoration: none;
            transition-property: border-color, color, background-color;
            transition-duration: 300ms;
            font-size: 0.5vw;
            width: 55vw;
            margin: 0 auto;
            position: absolute;
            top: 6.6vh;
            left: 1.5vw;
            display: flex;
            white-space: nowrap;
        }
        #link:hover {
            background-color: white;
            color: orange;
            border-color: orange;
        }
        #link i {
            padding: 0.3vh 0;
            right: 18px;
            position: absolute;
        }
        #link p {
            margin: 0;
        }
        .item-content {
            width: 0;
            opacity: 0;
            height: 0;
            overflow: hidden;
            transition-property: opacity;
            transition-duration: 200ms;
            transition-timing-function: linear;
            border-top-style: solid;
            border-top-color: white;
            border-top-width: 2px;
            border-bottom-style: solid;
            border-bottom-color: white;
            border-bottom-width: 2px;
            list-style-type: none;
            position: absolute;
        }
        .item-content.open {
            width: 60vw;
            height: 11vh;
            opacity: 1;
            overflow: visible;
            background-color: rgb(255, 202, 103);
        }
        h5, h6 {
            color: white;
            margin: 0;
        }
        #list ul{
            width: 60vw;
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        #disp ul {
            width: 20vw;
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        #disp li {
            border-color: rgb(255, 202, 103);
        }
        #disp {
            height: 11vh;
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="content">
        <div id="header"><h1>電車遅延情報</h1><h4 id="updt"></h4><h4>更新</h4></div>
        <div id="list">
            <ul>
                <li class="item" id="itemtop" style="display: none;">
                    <div class="item-head open" id="itemtop-head" style="display: none;">
                        <h1>電車遅延情報</h1>
                    </div>
                </li>
            </ul>
        </div>
        <div id="disp">
            <ul>
                <li class="item-content open" id="itemtop-content">
                    <p>ここに情報の詳細が表示されます。</p>
                </li>
            </ul>
        </div>
    </div>
    <script id="click-script"></script>
</body>
</html>
