<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJS Editor</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="./scss/style.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.4/css/all.css">
</head>
<body>
    <div id="loadingCover">
        <div id="loadingArea">
            <div class="loader"></div>
            <h2>Loading...</h2>
        </div>
    </div>
    <header>
        <div id="menubar">
            <div id="title">PJS Editor</div>
            <div id="account">
                <div id="id"></div>
                <div id="logout"><i class="fal fa-sign-out"></i></div>
            </div>
        </div>
        <div id="datebar">
            <div id="previousDate"><i class="fal fa-chevron-left"></i></div>
            <div id="currentDate"></div>
            <div id="nextDate"><i class="fal fa-chevron-right"></i></div>
        </div>
    </header>
    <main>
        <div id="target">
            <h2>目標・すること・意気込み</h2>
            <textarea id="targetArea"></textarea>
        </div>
        <div id="freespace">
            <h2>自由欄</h2>
            <textarea id="freeArea"></textarea>
        </div>
        <div id="review">
            <h2>振り返り</h2>
            <textarea id="reviewArea"></textarea>
        </div>
        <hr>
        <div id="temperature">
            <div>
                <h2>体温</h2>
                <input type="number" id="tempArea">
            </div>
            <div>
                <h2>登校日</h2>
                <input type="checkbox" id="attendanceArea">
                <label for="attendanceArea"><i class="fas fa-check-circle"></i></label>
            </div>
        </div>
        <hr>
        <button id="submitbtn">保存</button>
    </main>
    <script src="./js/script.js"></script>
</body>
</html>
