<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>Aikatoki homepage</title>
  <meta name="description" content="">
  <meta name="keywords" content="">
  <style type="text/css">
    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
    }
    h1 {
      margin: 0;
    }
    body a.Enter {
      color:#fff;
      font-size:10px;
      text-decoration: none;
      transition-duration: 1s;
      transition-property: all;
      margin-left: 0px;
      cursor: default;
    }
    body a.Enter:hover {
      background-color: #000;
      color:#fff;
      cursor: default;
      transition-property: all;
      transition-duration: 1s;
      font-weight: lighter;
    }
    div#fc2_footer {
      display: block;
    }
    /* header */
    header {
      position: fixed;
      height: 3vh;
      width: 100vw;
      background-color: rgb(238,238,238);
      display: flex;
    }
    header label {
      line-height: 3vh;
      padding: 0 1vw;
      font-size: 0.8vw;
    }
    .header-link {
      line-height: 3vh;
      border-style: none solid;
      border-width: 1px;
      border-color: #aaa;
      padding: 0 0.8vw;
      transition-property: filter, color, background;
      transition-duration: 300ms;
      background-color: rgb(238,238,238);
    }
    .header-link:hover {
      background-color: rgb(110, 110, 110);
      color: #fff;
    }
    #header-space {
      height: 3vh;
    }
    /* header end */
  </style>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body id="top">
  <header>
    <label>秋鹿朱鷺のホームページ</label>
    <div class="header-link" id="link0">サイト一覧</div>
  </header>
  <div id="header-space"></div>
  <h2>
    ようこそ！
  </h2>
  <p>
    ここでは投稿した動画や更新したサイトに関する情報を書いていきます！<br>
    ヘッダーからアクセスしてください！
  </p>
  <script>
    document.querySelector('#link0').onclick = function() {
      location.href = '/sites/';
    }
    document.querySelector('header').querySelector('label').onclick = function() {
      location.href = '/';
    }
  </script>
</body>
</html>
